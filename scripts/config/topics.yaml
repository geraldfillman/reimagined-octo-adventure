# Topic Registry
#
# Single source of truth for research topic flags shared across pullers.
# Each topic defines which pullers support it. The actual query/condition
# strings remain in each puller (they are API-specific), but this registry
# controls which --flag names are valid and where.
#
# Puller keys: arxiv | pubmed | clinicaltrials | sec

topics:
  # ── Defense & Aerospace ──────────────────────────────────────────────
  drones:
    label: Drones & Autonomous Aircraft
    enabled_pullers: [arxiv, sec]

  defense:
    label: Defense AI & Autonomous Weapons
    enabled_pullers: [arxiv, sec]

  space:
    label: Space & Satellite Systems
    enabled_pullers: [arxiv, sec]

  hypersonics:
    label: Hypersonic Weapons
    enabled_pullers: [sec]

  # ── Biotech & Healthcare ─────────────────────────────────────────────
  amr:
    label: Antimicrobial Resistance
    enabled_pullers: [arxiv, pubmed, clinicaltrials, sec]

  psychedelics:
    label: Psychedelic Therapeutics
    enabled_pullers: [arxiv, pubmed, sec]

  glp1:
    label: GLP-1 & Metabolic Disease
    enabled_pullers: [arxiv, pubmed, clinicaltrials, sec]

  geneediting:
    label: Gene Editing & CRISPR
    enabled_pullers: [arxiv, pubmed, clinicaltrials, sec]

  alzheimers:
    label: Alzheimer's Disease
    enabled_pullers: [arxiv, pubmed, clinicaltrials, sec]

  longevity:
    label: Longevity & Aging Biology
    enabled_pullers: [arxiv, pubmed, clinicaltrials, sec]

  oncology:
    label: Oncology
    enabled_pullers: [clinicaltrials]

  cardio:
